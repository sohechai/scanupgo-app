name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'scanupgo-git/scanupgo-app'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git author to Vercel owner
        run: |
          git config user.email "scanupgo@gmail.com"
          git config user.name "scanupgo"
          git commit --amend --no-edit --author="scanupgo <scanupgo@gmail.com>" || true

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
